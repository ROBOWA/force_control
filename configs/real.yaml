# Real Franka Panda configuration (Ubuntu Panda PC)

robot_ip: "172.16.0.2"

# IK: same site/target as sim — model must contain the controlled site
ik:
  mjcf: "franka_emika_panda/panda_impedance.xml"
  site_name: "stick_tip"
  target_pos: [0.5, -0.2, 0.2]
  target_euler_xyz: [30.0, 0.0, 0.0]
  move_time: 3.0

# Joint-space PD gains (Milestone 1 — same structure as sim)
joint_pd:
  kp: [200.0, 200.0, 200.0, 200.0, 80.0, 80.0, 40.0]
  kd: [ 20.0,  20.0,  20.0,  20.0,  8.0,  8.0,  4.0]

# FT sensor (ROS topic from FT PC)
ft:
  source: shm                  # "shm": read /dev/shm fed by scripts/ft_node.py (full 400 Hz, no GIL contention)
                               # "ros": subscribe in-process (starved to ~45 Hz by the RT loop)
  shm_path: /dev/shm/ft_wrench # shared-memory buffer written by scripts/ft_node.py
  topic: /ft_sensor/wrench     # used by ft_node (and by source=ros)
  output_frame: world          # "world": rotate sensor wrench into world frame each tick via MuJoCo FK; "sensor": leave in wrist frame
  site_name: ft_sensor_site    # MuJoCo site whose frame the FT sensor reports in (used for the world-frame rotation)
  sign: 1.0
  tare_on_approach: true
  tare_on_hold: true            # after reaching the IK goal, average FT for tare_duration and zero the payload baseline
  tare_duration: 5.0            # [s] FT averaging window in the TARE state (entered once after the move completes)
  lowpass_alpha: 0.2            # light smoothing for 400 Hz hardware stream
  debug_print: true            # 10 Hz FT heartbeat (count + values) in the control loop; false for timing-sensitive runs
  queue_size: 0                # ROS subscriber (source=ros only): 0 = unbounded/full rate like rostopic; >0 keeps only the last N per batch (throttles)

# Payload gravity compensation (full-minus-zero MJCF method)
payload_gravity:
  enabled: True
  model_full: franka_emika_panda/panda_impedance.xml   # robot + ft_sensor + stick
  model_zero: franka_emika_panda/panda_impedance_4.xml   # robot arm only
  torque_clip: 15.0                                        # [Nm] per-joint safety clip

# Payload gravity-compensation calibration (scripts/calibrate_payload_gravity.py)
# Multi-pose FT-gravity fit -> mass + CoM in the ft_sensor_site frame, written as
# an MJCF <include> fragment that model_full (panda_impedance.xml) loads.
payload_calibration:
  model: franka_emika_panda/panda_impedance.xml      # model whose site defines the fit frame (FK)
  site_name: ft_sensor_site                          # frame the mass/CoM is expressed in
  fragment_out: franka_emika_panda/ft_payload.xml    # <include>d by panda_impedance.xml; overwritten each run
  fit_npz: data/payload_gravity_fit.npz              # audit dump (mass, com, bias, raw ft+rotations)
  body_name: ft_payload                              # name of the generated payload body
  diaginertia: [0.0011, 0.00275, 0.00187]            # carried over (gravity fit does not measure inertia)
  num_poses: 6                                       # >=4; vary orientation widely between poses
  samples_per_pose: 300                              # distinct shared-memory FT frames averaged per pose
  settle: 2.0                                        # [s] wait before averaging
  mass_scale: 1.0                                    # empirical uplift applied to fitted mass (was 1.10)

# Safety
safety:
  max_torque: [87.0, 87.0, 87.0, 87.0, 12.0, 12.0, 12.0]   # [Nm] Panda limits
  max_torque_rate: 1.0                                         # [Nm] per 1 ms tick

# ControllerCore (future — Cartesian impedance, not used in Milestone 1)
controller:
  max_torque_rate: 1.0
  null_stiffness: 1.0
  null_q_d: [0.0, -0.3, 0.0, -1.8, 0.0, 1.5, 0.0]
  K: [1000.0, 1000.0, 1000.0, 100.0, 100.0, 100.0]
  D: [100.0, 100.0,  100.0,  3.0,  3.0,  3.0]
  force_pi_kp: 0.002
  force_pi_ki: 0.0002
  force_pi_max: 3.0
  target_stale_ms: 10.0
  ft_stale_ms: 15.0

# StateMachine
state_machine:
  # --- Milestone 2: post-tare Cartesian approach + z-force hold ---
  approach_enabled: true        # false → stop at HOLD after the tare (Milestone-1 behavior)
  approach_speed: 0.005         # [m/s] constant world -Z descent speed
  contact_fz_threshold: 2.0     # [N] +Fz (compression) level that counts as contact
  contact_confirm_samples: 5    # consecutive ticks above threshold before switching to force hold
  F_normal_desired: 2.0         # [N] target normal force held during FORCE_HOLD
  force_kp: 0.0005              # [m/s per N] admittance: z_dot = kp*e + kd*de/dt
  force_kd: 0.0                 # [m per N] admittance derivative gain
  max_force_hold_speed: 0.01    # [m/s] clamp on z_ref velocity during force hold
  max_depth: 0.05               # [m] z_ref may not go below z_contact - max_depth
  retract_allowance: 0.01       # [m] z_ref may not rise above z_contact + retract_allowance

  # --- Future: contact/slide/lift phases (unused in Milestone 2) ---
  settle_duration: 1.0
  slide_speed: 0.002
  slide_distance: 0.03
  lift_height: 0.05
  lift_speed: 0.005
  target_z_contact: 0.02

# Logging
logging:
  enabled: true
  output_dir: data/logs
  prefix: real
  capacity: 1500000            # max rows preallocated (~25 min at 1 kHz); logging stops when full
  print_stats_hz: 1.0
