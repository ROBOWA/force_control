# Real Franka Panda configuration (Ubuntu Panda PC)

robot_ip: "172.16.0.2"

# IK: same site/target as sim — model must contain the controlled site
ik:
  mjcf: "franka_emika_panda/panda_impedance.xml"
  site_name: "stick_tip"
  target_pos: [0.5, -0.2, 0.3]
  target_euler_xyz: [30.0, 0.0, 0.0]
  move_time: 5.0

# Joint-space PD gains (Milestone 1 — same structure as sim)
joint_pd:
  kp: [200.0, 200.0, 200.0, 200.0, 80.0, 80.0, 40.0]
  kd: [ 20.0,  20.0,  20.0,  20.0,  8.0,  8.0,  4.0]

# FT sensor (ROS topic from FT PC)
ft:
  source: ros
  topic: /ft_sensor/wrench
  output_frame: world
  sign: 1.0
  tare_on_approach: true
  lowpass_alpha: 0.2            # light smoothing for 400 Hz hardware stream

# Payload gravity compensation (full-minus-zero MJCF method)
payload_gravity:
  enabled: True
  model_full: franka_emika_panda/scene_payload_full.xml   # robot + ft_sensor + stick
  model_zero: franka_emika_panda/scene_payload_zero.xml   # robot arm only
  torque_clip: 15.0                                        # [Nm] per-joint safety clip

# Safety
safety:
  max_torque: [87.0, 87.0, 87.0, 87.0, 12.0, 12.0, 12.0]   # [Nm] Panda limits
  max_torque_rate: 1.0                                         # [Nm] per 1 ms tick

# ControllerCore (future — Cartesian impedance, not used in Milestone 1)
controller:
  max_torque_rate: 1.0
  null_stiffness: 10.0
  null_q_d: [0.0, -0.3, 0.0, -1.8, 0.0, 1.5, 0.0]
  K: [200.0, 200.0, 200.0, 10.0, 10.0, 10.0]
  D: [30.0,  30.0,  30.0,  3.0,  3.0,  3.0]
  force_pi_kp: 0.0005
  force_pi_ki: 0.00005
  force_pi_max: 3.0
  target_stale_ms: 10.0
  ft_stale_ms: 15.0

# StateMachine (future — contact/force/slide phases)
state_machine:
  contact_fz_threshold: 1.0
  approach_speed: 0.002
  settle_duration: 1.0
  slide_speed: 0.002
  slide_distance: 0.03
  lift_height: 0.05
  lift_speed: 0.005
  F_normal_desired: 2.0
  target_z_contact: 0.02

# Logging
logging:
  enabled: true
  output_dir: data/logs
  prefix: real
  print_stats_hz: 1.0
