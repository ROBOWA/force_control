# MuJoCo simulation configuration (Mac development mode)

mjcf: franka_emika_panda/panda_impedance.xml

# Milestone 1: IK target and joint-space trajectory
ik:
  site_name: stick_tip            # named site in the MJCF to control
  target_pos: [0.5, -0.2, 0.3]    # desired site position in world frame [m]
  move_time: 5.0                  # min-jerk move duration [s]

  target_euler_xyz: [30, 0, 0]   # extra rotation in site body frame; [0,0,0] = keep current orientation

# Payload gravity compensation (full-minus-zero MJCF method)
payload_gravity:
  enabled: True
  model_full: franka_emika_panda/panda_impedance.xml   # robot + ft_sensor + stick
  model_zero: franka_emika_panda/panda_impedance_4.xml   # robot arm only
  torque_clip: 15.0                                        # [Nm] per-joint safety clip

# Joint-space PD gains (used during MOVE_JOINT and HOLD_JOINT)
# Format: [joint1 … joint7]
joint_pd:
  kp: [200.0, 200.0, 200.0, 200.0, 80.0, 80.0, 40.0]  # [Nm/rad]
  kd: [ 20.0,  20.0,  20.0,  20.0,  8.0,  8.0,  4.0]  # [Nm·s/rad]

# ControllerCore
controller:
  max_torque_rate: 1.0          # [Nm] per 1 ms tick
  null_stiffness: 10.0          # [Nm/rad]
  null_q_d: [0.0, -0.3, 0.0, -1.8, 0.0, 1.5, 0.0]  # home config

  # Cartesian stiffness/damping (6-DOF: [x, y, z, rx, ry, rz])
  K: [500.0, 500.0, 500.0, 30.0, 30.0, 30.0]
  D: [50.0,  50.0,  50.0,  5.0,  5.0,  5.0]

  # Force PI (active only in CONTACT / SETTLE / SLIDE phases)
  force_pi_kp: 0.001
  force_pi_ki: 0.0001
  force_pi_max: 5.0             # [N] anti-windup clamp

  # Staleness thresholds
  target_stale_ms: 50.0
  ft_stale_ms: 20.0

# StateMachine
state_machine:
  # --- Milestone 2: post-tare Cartesian approach + z-force hold ---
  approach_enabled: true        # false → stop at HOLD after the tare (Milestone-1 behavior)
  approach_speed: 0.005         # [m/s] constant world -Z descent speed
  contact_fz_threshold: 2.0     # [N] +Fz (compression) level that counts as contact
  contact_confirm_samples: 5    # consecutive ticks above threshold before switching to force hold
  F_normal_desired: 3.0         # [N] target normal force held during FORCE_HOLD
  force_kp: 0.0005              # [m/s per N] admittance: z_dot = kp*e + kd*de/dt
  force_kd: 0.0                 # [m per N] admittance derivative gain
  max_force_hold_speed: 0.01    # [m/s] clamp on z_ref velocity during force hold
  max_depth: 0.05               # [m] z_ref may not go below z_contact - max_depth
  retract_allowance: 0.01       # [m] z_ref may not rise above z_contact + retract_allowance

  # --- Future: contact/slide/lift phases (unused in Milestone 2) ---
  settle_duration: 0.5          # [s]
  slide_speed: 0.003            # [m/s]
  slide_distance: 0.05          # [m]
  lift_height: 0.05             # [m]
  lift_speed: 0.01              # [m/s]
  target_z_contact: 0.01        # [m] approximate surface z in base frame

# FT source
ft:
  source: mujoco
  force_sensor_name: ft_force
  torque_sensor_name: ft_torque
  site_name: ft_sensor_site
  output_frame: world           # "site" keeps sensor frame; "world" rotates via site_xmat
  sign: 1.0
  tare_on_approach: true
  tare_on_hold: true            # after reaching the IK goal, average FT for tare_duration and zero the payload baseline
  tare_duration: 2.0            # [s] FT averaging window in the TARE state (entered once after the move completes)
  lowpass_alpha: 1.0            # 1.0 = no filtering; reduce for hardware noise

# Logging — per-tick CSV of tip position (xyz), tip velocity (xyz), Fz, phase
logging:
  enabled: true
  output_dir: data/logs
  prefix: sim
  capacity: 1500000            # max rows preallocated; logging stops when full
